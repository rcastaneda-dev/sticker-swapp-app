name: Mobile CI/CD

on:
  pull_request:
    branches: [ main ]

  push:
    branches: [ main ]

env:
  FLUTTER_VERSION_FILE: .flutter-version

jobs:

  lint-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Read Flutter version
        id: flutter_version
        run: echo "version=$(cat $FLUTTER_VERSION_FILE)" >> $GITHUB_OUTPUT

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ steps.flutter_version.outputs.version }}

      - name: Cache Flutter dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            mobile/.dart_tool
          key: ${{ runner.os }}-flutter-${{ hashFiles('mobile/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-flutter-

      - name: Install dependencies
        run: flutter pub get
        working-directory: mobile

      - name: Lint
        run: flutter analyze
        working-directory: mobile

      - name: Run Tests
        run: flutter test
        working-directory: mobile

  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    needs: lint-test

    steps:
      - uses: actions/checkout@v4

      - name: Read Flutter version
        id: flutter_version
        run: echo "version=$(cat $FLUTTER_VERSION_FILE)" >> $GITHUB_OUTPUT

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ steps.flutter_version.outputs.version }}

      - name: Cache Flutter dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            mobile/.dart_tool
          key: ${{ runner.os }}-flutter-${{ hashFiles('mobile/pubspec.lock') }}

      - name: Install dependencies
        run: flutter pub get
        working-directory: mobile

      - name: Auto version bump
        run: |
          sed -i "s/^version:.*/version: 1.0.${{ github.run_number }}/" pubspec.yaml
        working-directory: mobile

      - name: Build Android AppBundle
        run: flutter build appbundle --release
        working-directory: mobile

      - name: Upload Android Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-aab
          path: mobile/build/app/outputs/bundle/release/app-release.aab

      - name: Deploy to Google Play Internal
        if: github.event_name == 'push'
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.worldcup.stickers
          releaseFiles: mobile/build/app/outputs/bundle/release/app-release.aab
          track: internal

  build-ios:
    name: Build iOS
    runs-on: macos-latest
    needs: lint-test

    steps:
      - uses: actions/checkout@v4

      - name: Read Flutter version
        id: flutter_version
        run: echo "version=$(cat $FLUTTER_VERSION_FILE)" >> $GITHUB_OUTPUT

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ steps.flutter_version.outputs.version }}

      - name: Cache Flutter dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            mobile/.dart_tool
          key: ${{ runner.os }}-flutter-${{ hashFiles('mobile/pubspec.lock') }}

      - name: Install dependencies
        run: flutter pub get
        working-directory: mobile

      - name: Auto version bump
        run: |
          sed -i '' "s/^version:.*/version: 1.0.${{ github.run_number }}/" pubspec.yaml
        working-directory: mobile

      - name: Build iOS IPA
        run: flutter build ipa --release
        working-directory: mobile

      - name: Upload iOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: mobile/build/ios/ipa/*.ipa

      - name: Upload to TestFlight
        if: github.event_name == 'push'
        uses: apple-actions/upload-testflight-build@v1
        with:
          app-path: mobile/build/ios/ipa/*.ipa
          issuer-id: ${{ secrets.APPSTORE_CONNECT_ISSUER_ID }}
          api-key-id: ${{ secrets.APPSTORE_CONNECT_API_KEY_ID }}
          api-private-key: ${{ secrets.APPSTORE_CONNECT_API_KEY }}